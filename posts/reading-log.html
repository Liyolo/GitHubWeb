    <h1>五月阅读记录：给注意力留白</h1>
    <p>这个月最有用的阅读，不是读得最多的那几天，而是读完之后愿意停下来的时刻。</p>
    <p>留白让一本书有机会进入现实：一句话变成一次散步里的念头，一个观点变成工作时的判断，一个故事改变了看待他人的角度。</p>
    <p>记录这些片段，是为了让阅读不只停在输入，而能慢慢变成生活的一部分。</p>
