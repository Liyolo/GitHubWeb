    <h1>从零搭一个可以长期维护的个人网站</h1>
    <p>个人网站最重要的不是技术栈有多华丽，而是它能不能稳定地承载更新。</p>
    <p>这个版本选择了最朴素的静态页面：没有构建步骤，没有数据库，也没有复杂依赖。好处是部署简单、打开很快，日后迁移到框架也不会被早期选择绑住。</p>
    <p>接下来可以逐步增加归档页、RSS、文章搜索和自定义域名。每一步都应该服务于写作，而不是让维护网站本身变成新的负担。</p>
