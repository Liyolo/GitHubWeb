    <h1>第一篇：为什么要重新开始写作</h1>
    <p>重新开始写作，通常不是因为已经想清楚了，而是因为需要一个地方慢慢想清楚。</p>
    <p>博客像一张长期展开的工作台。今天放上一个问题，明天补一段观察，过几个月回头看，会发现自己曾经模糊的判断已经有了纹理。</p>
    <p>第一阶段的目标很简单：持续记录，保持可读，不追求完美。</p>
